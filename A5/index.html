<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SVG Viewer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ═══════════════════════════ HEADER ═══════════════════════════ -->
<header>
  <h1>SVG <span>Viewer</span></h1>
  <div class="header-divider"></div>

  <!-- File open -->
  <input type="file" id="file-input" accept=".svg,image/svg+xml" />
  <label id="file-label" for="file-input" class="btn primary">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    打开 SVG
  </label>
  <span id="file-name"></span>

  <div class="header-divider"></div>

  <!-- Zoom controls -->
  <div class="toolbar">
    <div class="zoom-group">
      <button class="btn btn-icon" id="btn-zoom-out" title="缩小 (-)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </button>
      <span id="zoom-display">100%</span>
      <button class="btn btn-icon" id="btn-zoom-in" title="放大 (+)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </button>
    </div>

    <button class="btn" id="btn-fit" title="适应窗口 (0)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
      </svg>
      适应窗口
    </button>

    <button class="btn" id="btn-actual" title="原始大小 (1)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M9 9h6v6H9z"/>
      </svg>
      100%
    </button>

    <div class="header-divider"></div>

    <button class="btn" id="btn-export-svg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      导出 SVG
    </button>

    <button class="btn" id="btn-export-png">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      导出 PNG
    </button>

    <div class="header-divider"></div>

    <button class="btn btn-icon" id="btn-toggle-panel" title="信息面板">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </button>
  </div>
</header>

<!-- ════════════════════════════ MAIN ════════════════════════════ -->
<div class="main">

  <!-- Canvas -->
  <div id="canvas-wrapper">

    <!-- Drop overlay -->
    <div id="drop-overlay">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p>释放以加载 SVG</p>
    </div>

    <!-- Empty state hint -->
    <div id="empty-hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <rect x="2" y="3" width="20" height="18" rx="2"/>
        <path d="M8 10l4-4 4 4M8 14l4 4 4-4" stroke-width="1.2"/>
      </svg>
      <p>拖放 SVG 文件到此处，或点击上方按钮打开</p>
      <small>支持滚轮缩放 · 拖拽平移 · 触摸捏合 · 粘贴 SVG 代码</small>
    </div>

    <!-- SVG renders here -->
    <div id="svg-container"></div>
  </div>

  <!-- Info panel -->
  <aside id="info-panel">
    <div class="panel-section">
      <h3>图像信息</h3>
      <div class="info-row">
        <span class="info-label">宽度</span>
        <span class="info-value" id="info-width">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">高度</span>
        <span class="info-value" id="info-height">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">ViewBox</span>
        <span class="info-value" id="info-viewbox" style="font-size:11px">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">元素数</span>
        <span class="info-value" id="info-element-count">—</span>
      </div>
    </div>
    <div class="panel-section">
      <h3>文件信息</h3>
      <div class="info-row">
        <span class="info-label">文件名</span>
        <span class="info-value" id="info-filename" style="font-size:11px;word-break:break-all">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">大小</span>
        <span class="info-value" id="info-filesize">—</span>
      </div>
    </div>
    <div class="panel-section">
      <h3>快捷键</h3>
      <div class="info-row"><span class="info-label">滚轮</span><span class="info-value">缩放</span></div>
      <div class="info-row"><span class="info-label">Ctrl+滚轮</span><span class="info-value">微调缩放</span></div>
      <div class="info-row"><span class="info-label">拖拽</span><span class="info-value">平移</span></div>
      <div class="info-row"><span class="info-label">+ / -</span><span class="info-value">缩放</span></div>
      <div class="info-row"><span class="info-label">0</span><span class="info-value">适应窗口</span></div>
      <div class="info-row"><span class="info-label">1</span><span class="info-value">原始大小</span></div>
      <div class="info-row"><span class="info-label">Ctrl+V</span><span class="info-value">粘贴 SVG</span></div>
    </div>
  </aside>

</div>

<!-- ════════════════════════════ STATUS BAR ══════════════════════ -->
<div id="status-bar">
  <span title="缩放比例">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <span id="status-zoom">100%</span>
  </span>
  <span title="鼠标坐标">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="1"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
    </svg>
    <span id="status-pos">—</span>
  </span>
  <span title="图像尺寸">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
    </svg>
    <span id="status-dim">—</span>
  </span>
  <span id="status-msg"></span>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="js/main.js"></script>
</body>
</html>
